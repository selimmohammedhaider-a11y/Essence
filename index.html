<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECCENCE | High-Value Specialist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=Montserrat:wght@100;300;600&display=swap" rel="stylesheet">
    <style>
        :root { --rose-gold: #e5b0a3; --deep-burgundy: #1a0101; }
        body { background-color: var(--deep-burgundy); color: white; font-family: 'Montserrat', sans-serif; overflow-x: hidden; }
        .luxury-font { font-family: 'Cormorant Garamond', serif; }
        
        /* VIDEO SHUFFLER ENGINE */
        .video-container { position: absolute; inset: 0; width: 100%; height: 100%; overflow: hidden; opacity: 0.5; z-index: 0; }
        .hero-vid { position: absolute; width: 100%; height: 100%; object-fit: cover; transition: opacity 2s ease-in-out; opacity: 0; }
        .hero-vid.active { opacity: 1; }

        /* SEPARATE TABS LOGIC */
        .page-tab { display: none; min-height: 100vh; position: relative; width: 100%; }
        .active-tab { display: block; animation: fadeEffect 1s ease; }
        @keyframes fadeEffect { from { opacity: 0; } to { opacity: 1; } }

        /* GLASS MORPHISM */
        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            cursor: pointer;
        }
        .glass-card:hover { border-color: var(--rose-gold); transform: translateY(-10px); background: rgba(255,255,255,0.05); }
        
        /* BUTTONS & DOTS */
        .presence-dot { width: 6px; height: 6px; background: #4ade80; border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 10px #4ade80; }
        .nav-link { font-size: 9px; text-transform: uppercase; letter-spacing: 3px; opacity: 0.4; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { opacity: 1; color: var(--rose-gold); }
    </style>
</head>
<body>

    <nav class="fixed w-full z-[100] border-b border-white/5 px-6 py-6 flex justify-between items-center bg-[#1a0101]/90 backdrop-blur-2xl">
        <h1 class="luxury-font text-2xl tracking-[0.5em] cursor-pointer" onclick="navTo('home')">ECCENCE</h1>
        <div class="flex items-center gap-6 md:gap-10">
            <button onclick="navTo('home')" id="nav-home" class="nav-link active">Home</button>
            <button onclick="navTo('vault')" id="nav-vault" class="nav-link">The Vault</button>
            <div class="relative cursor-pointer text-rose-gold" onclick="toggleCart()">
                <i data-lucide="shopping-bag" class="w-5 h-5"></i>
                <span id="cart-badge" class="absolute -top-3 -right-3 bg-white text-black text-[9px] font-bold w-4 h-4 rounded-full flex items-center justify-center">0</span>
            </div>
        </div>
    </nav>

    <main id="home-tab" class="page-tab active-tab flex items-center justify-center text-center">
        <div class="video-container">
            <video src="Diorhomevid.mp4" class="hero-vid active" autoplay muted loop playsinline></video>
            <video src="CocoChanelvid.mp4" class="hero-vid" autoplay muted loop playsinline></video>
        </div>
        <div class="relative z-10 space-y-8 px-4">
            <div class="text-[9px] uppercase tracking-[0.5em] opacity-60">
                <span class="presence-dot"></span> <span id="user-count">21</span> Specialists Online
            </div>
            <h2 class="luxury-font text-6xl md:text-9xl italic leading-tight">Authentic<br>Presence</h2>
            <button onclick="navTo('vault')" class="px-12 py-5 border border-rose-gold text-rose-gold uppercase tracking-[0.6em] text-[10px] hover:bg-rose-gold hover:text-black transition-all">Enter Vault</button>
        </div>
    </main>

    <main id="vault-tab" class="page-tab pt-32 pb-20 px-6 md:px-12">
        <div class="flex flex-col md:flex-row justify-between items-end mb-16 gap-8">
            <div>
                <h2 class="luxury-font text-6xl italic">The Archive</h2>
                <div class="flex gap-6 mt-4">
                    <button onclick="filterG('All')" class="text-[9px] uppercase tracking-widest opacity-40 hover:opacity-100">All</button>
                    <button onclick="filterG('Men')" class="text-[9px] uppercase tracking-widest opacity-40 hover:opacity-100">Men</button>
                    <button onclick="filterG('Women')" class="text-[9px] uppercase tracking-widest opacity-40 hover:opacity-100">Women</button>
                    <button onclick="filterG('Niche')" class="text-[9px] uppercase tracking-widest opacity-40 hover:opacity-100">Niche</button>
                </div>
            </div>
            <input type="text" id="v-search" placeholder="SEARCH ASSET..." class="bg-transparent border-b border-white/10 py-2 text-[10px] tracking-widest outline-none focus:border-rose-gold w-full md:w-64" onkeyup="searchV()">
        </div>
        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-10"></div>
    </main>

    <div id="p-modal" class="fixed inset-0 z-[500] hidden flex items-center justify-center bg-black/95 backdrop-blur-xl p-4" onclick="closeP()">
        <div class="bg-[#0d0101] border border-white/10 p-8 md:p-12 max-w-5xl w-full flex flex-col md:flex-row gap-12" onclick="event.stopPropagation()">
            <div class="w-full md:w-1/2 bg-white/5 p-6 flex items-center justify-center">
                <img id="m-img" src="" class="max-h-[350px] object-contain">
            </div>
            <div class="w-full md:w-1/2 space-y-6">
                <h3 id="m-name" class="luxury-font text-5xl italic"></h3>
                <div class="flex items-baseline gap-4">
                    <span id="m-price" class="text-3xl text-rose-gold"></span>
                    <span id="m-old" class="text-sm opacity-30 line-through"></span>
                </div>
                <div id="m-variants-section">
                    <p class="text-[8px] uppercase tracking-widest opacity-30 mb-4">Volume Selection</p>
                    <div id="m-variants" class="flex gap-3"></div>
                </div>
                <button onclick="addToCart()" class="w-full py-5 bg-white text-black uppercase text-[10px] tracking-widest font-bold hover:bg-rose-gold transition">Acquire Asset</button>
            </div>
        </div>
    </div>

    <script>
        // MASTER FILE NAMES (Every single one we talked about)
        const inventory = [
            { id: 1, name: "YSL MYSLF", cat: "Men", file: "MYSLF Le Parfum - Men's Spicy Vanilla Fragrance - YSL Beauty.jpg", variants: [{s:"60ml", p:1000, o:1400},{s:"100ml", p:1400, o:1900}] },
            { id: 2, name: "YSL Y EDP", cat: "Men", file: "Ysl.JPG", variants: [{s:"100ml", p:1200, o:1650},{s:"200ml", p:2100, o:2800}] },
            { id: 3, name: "Lattafa Asad", cat: "Men", file: "Lattafa Perfumes Asad for Unisex Eau de Parfum Spray, 3_4 Ounce.jpg", price: 850, old: 1100 },
            { id: 4, name: "Asad Bourbon", cat: "Men", file: "Lattafa Asad Bourbon Mens Perfume.jpg", price: 900, old: 1250 },
            { id: 5, name: "His Confession", cat: "Men", file: "Lattafa His Confession for Men Eau de Parfum Spray, 3_4 Ounce _ 100 Ml.jpg", price: 780, old: 1050 },
            { id: 6, name: "Dior Homme", cat: "Men", file: "Diorhome.JPG", price: 1100, old: 1550 },
            { id: 7, name: "JPG Le Male", cat: "Men", file: "jpgmale.jpg", price: 950, old: 1300 },
            { id: 8, name: "Dark Verse", cat: "Women", file: "Luna Caine ✩ Dark Verse.webp", price: 1180, old: 1650 },
            { id: 9, name: "JPG Divine", cat: "Women", file: "jpgwommen.webp", price: 1100, old: 1500 },
            { id: 10, name: "Black Opium", cat: "Women", file: "Yves Saint Laurent - $150_00.webp", price: 1200, old: 1700 },
            { id: 11, name: "Libre Intense", cat: "Women", file: "Libre Eau de Parfum Intense Women's Perfume _ YSL Beauty.webp", price: 1200, old: 1800 },
            { id: 12, name: "Cookie Crave", cat: "Women", file: "Lattafa Give Me Gourmand Cookie Crave Eau de Parfum Unisexe 75 ml.jpg", price: 720, old: 980 },
            { id: 13, name: "Born In Roma", cat: "Women", file: "valnteino born in rome intense wommen.jpg", price: 1200, old: 1750 },
            { id: 14, name: "LV Imagination", cat: "Niche", file: "LouisVuittonimagination.JPG", price: 4800, old: 5800 },
            { id: 15, name: "LV Pacific Chill", cat: "Niche", file: "LouisVuittonPacificchill.JPG", price: 4800, old: 5800 },
            { id: 16, name: "God of Fire", cat: "Niche", file: "Stephane Humbert Lucas God of Fire Eau de Parfum (50ml).jpg", price: 5200, old: 6500 },
            { id: 17, name: "Delina Exclusif", cat: "Niche", file: "pdm dalida.webp", price: 4900, old: 6200 },
            { id: 18, name: "Naxos", cat: "Niche", file: "Scent Split.jpg", price: 4400, old: 5400 }
        ];

        // 1. TABS NAVIGATION LOGIC
        function navTo(page) {
            document.querySelectorAll('.page-tab').forEach(p => p.classList.remove('active-tab'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            
            document.getElementById(page + '-tab').classList.add('active-tab');
            document.getElementById('nav-' + page).classList.add('active');
            window.scrollTo(0,0);
        }

        // 2. VIDEO SHUFFLER LOGIC
        let vI = 0; const vids = document.querySelectorAll('.hero-vid');
        setInterval(() => {
            vids[vI].classList.remove('active');
            vI = (vI + 1) % vids.length;
            vids[vI].classList.add('active');
        }, 5000);

        // 3. VAULT RENDERER
        function render(list) {
            document.getElementById('product-grid').innerHTML = list.map(p => `
                <div class="glass-card p-6 md:p-10 flex flex-col items-center text-center" onclick="openP(${p.id})">
                    <img src="${p.file}" class="h-32 md:h-56 object-contain mb-6">
                    <h4 class="luxury-font text-lg md:text-2xl italic">${p.name}</h4>
                    <p class="text-rose-gold text-[10px] mt-2">${p.variants ? p.variants[0].p : p.price} EGP</p>
                </div>
            `).join('');
        }

        // 4. MODAL LOGIC
        let currentP, currentV;
        function openP(id) {
            currentP = inventory.find(x => x.id === id);
            currentV = currentP.variants ? currentP.variants[0] : {s:'100ml', p:currentP.price, o:currentP.old};
            document.getElementById('m-img').src = currentP.file;
            document.getElementById('m-name').innerText = currentP.name;
            updateModalUI();
            
            const vDiv = document.getElementById('m-variants');
            if(currentP.variants) {
                document.getElementById('m-variants-section').style.display = 'block';
                vDiv.innerHTML = currentP.variants.map(v => `<button onclick="setVariant('${v.s}',${v.p},${v.o},this)" class="px-4 py-2 border border-white/10 text-[10px] ${v.s===currentV.s?'text-rose-gold border-rose-gold':''}">${v.s}</button>`).join('');
            } else { document.getElementById('m-variants-section').style.display = 'none'; }
            
            document.getElementById('p-modal').classList.remove('hidden');
        }

        function closeP() { document.getElementById('p-modal').classList.add('hidden'); }
        function setVariant(s,p,o,btn) {
            currentV = {s,p,o};
            btn.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('text-rose-gold','border-rose-gold'));
            btn.classList.add('text-rose-gold','border-rose-gold');
            updateModalUI();
        }
        function updateModalUI() {
            document.getElementById('m-price').innerText = currentV.p + " EGP";
            document.getElementById('m-old').innerText = currentV.o + " EGP";
        }

        // 5. MISC LOGIC
        function filterG(g) { render(g==='All' ? inventory : inventory.filter(x => x.cat === g)); }
        function searchV() { const query = document.getElementById('v-search').value.toLowerCase(); render(inventory.filter(p => p.name.toLowerCase().includes(query))); }
        setInterval(() => { const el = document.getElementById('user-count'); el.innerText = parseInt(el.innerText) + (Math.random() > 0.5 ? 1 : -1); }, 4000);

        render(inventory);
        lucide.createIcons();
    </script>
</body>
</html>
